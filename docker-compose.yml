services:
  web:
    build: .
    ports:
      - "53000:53000"
    env_file:
      - .env
    environment:
      # Same-origin embed of the hermes-webui service below: the app
      # reverse-proxies it at /hermes-ui/ and the Hermes tab (shortcut 6)
      # appears — no nginx/DNS changes needed. Comment this out to run
      # without the Hermes integration (tab disappears).
      HERMES_WEBUI_INTERNAL_URL: http://hermes-webui:8787
    restart: unless-stopped
    volumes:
      - ./instance:/app/instance
      - ./src:/app/src

  # simpler-mcp: MCP sidecar exposing the app's domain as agent tools
  # (PRD 002 pillar A). Wraps the REST API with the API_TOKEN bearer
  # credential; serves streamable HTTP at /mcp. NOT published on the host —
  # the hermes-webui service reaches it over the compose network at
  # http://mcp:8765/mcp. Uncomment `ports` only for a Hermes running
  # directly on the host.
  mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    environment:
      SIMPLER_BASE_URL: http://web:53000
      SIMPLER_API_TOKEN: ${API_TOKEN:-}
    # ports:
    #   - "127.0.0.1:8765:8765"
    depends_on:
      - web
    restart: unless-stopped

  # hermes-webui: chat UI + Hermes Agent, fully containerized (PRD 002
  # pillar B). Built straight from the upstream repo; on first start the
  # bootstrap auto-installs Hermes Agent into ./hermes-home (persisted, so
  # later starts are fast and offline-safe). No host port: it is reachable
  # ONLY through the app's authenticated /hermes-ui/ proxy, so Simpler's
  # login is the single gate. Configure the agent (model API key, MCP
  # servers) in ./hermes-home/config.yaml — see doc/setup-hermes-integration.md.
  hermes-webui:
    build:
      # Pin to a tag/commit instead of master for reproducible rebuilds,
      # e.g. ...hermes-webui.git#v1.2.3
      context: https://github.com/nesquena/hermes-webui.git#master
    environment:
      HERMES_WEBUI_HOST: 0.0.0.0
      HERMES_WEBUI_PORT: 8787
      HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
      HERMES_WEBUI_AUTO_INSTALL: "1"
      HERMES_WEBUI_DEFAULT_WORKSPACE: /workspace
      WANTED_UID: ${WANTED_UID:-1000}
      WANTED_GID: ${WANTED_GID:-1000}
    volumes:
      - ./hermes-home:/home/hermeswebui/.hermes
      - ./hermes-workspace:/workspace
    depends_on:
      - mcp
    restart: unless-stopped
