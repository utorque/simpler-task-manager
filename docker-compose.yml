services:
  # web: the whole app — Flask + the embedded Chainlit assistant, one server
  # (see asgi.py). The Assistant tab (shortcut 6) is always on in this image;
  # the assistant reuses the AI_* provider config from .env and stores chat
  # history in ./instance/chainlit.db next to the app DB.
  web:
    build: .
    ports:
      - "53000:53000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./instance:/app/instance
      - ./src:/app/src

  # simpler-mcp: MCP sidecar exposing the app's domain as agent tools.
  # Wraps the REST API with the API_TOKEN bearer credential; serves
  # streamable HTTP at /mcp. NOT published on the host — the embedded
  # assistant (and any other compose-network agent) reaches it at
  # http://mcp:8765/mcp. Uncomment `ports` only for an agent running
  # directly on the host.
  mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    environment:
      SIMPLER_BASE_URL: http://web:53000
      SIMPLER_API_TOKEN: ${API_TOKEN:-}
    # ports:
    #   - "127.0.0.1:8765:8765"
    depends_on:
      - web
    restart: unless-stopped
