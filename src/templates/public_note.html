<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>{{ note_title }} · Simpler</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <style>
        body {
            margin: 0;
            background: #f7f8fa;
            color: #2d3748;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .public-note-wrap {
            max-width: 820px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }
        .public-note-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #718096;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .public-note-brand .fa-bolt { color: #667eea; }
        .public-note-badge {
            margin-left: auto;
            font-size: 11px;
            border: 1px solid #cbd5e0;
            border-radius: 12px;
            padding: 2px 10px;
            color: #718096;
        }
        /* The whole note is read-only: EasyMDE stays locked in the rendered
           preview; there is no edit affordance on this page. */
        .editor-toolbar { border-radius: 8px 8px 0 0; }
        .CodeMirror, .editor-preview-full {
            border-radius: 0 0 8px 8px;
            background: white;
        }
        .copy-flash {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3748;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none;
        }
        .copy-flash.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="public-note-wrap">
        <div class="public-note-brand">
            <i class="fas fa-bolt"></i><strong>Simpler</strong>
            <span class="public-note-badge"><i class="fas fa-lock"></i> Read-only shared note</span>
        </div>
        <!-- Server injects the LATEST saved markdown on every page load. -->
        <textarea id="publicNoteEditor">{{ content_markdown }}</textarea>
    </div>
    <div class="copy-flash" id="copyFlash">Copied raw markdown to clipboard</div>

    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <script>
        (function () {
            function flash() {
                const el = document.getElementById('copyFlash');
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 1600);
            }
            // Copy the raw markdown source (not the rendered HTML). Shared with
            // the private editor's toolbar tool (static/js/notes.js).
            function copyRawMarkdown(editor) {
                const text = editor.value();
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(flash, fallbackCopy.bind(null, text));
                } else {
                    fallbackCopy(text);
                }
            }
            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); flash(); } catch (e) { /* no-op */ }
                ta.remove();
            }

            const easyMDE = new EasyMDE({
                element: document.getElementById('publicNoteEditor'),
                autosave: { enabled: false },
                status: false,
                spellChecker: false,
                toolbar: [
                    {
                        name: 'copy-markdown',
                        action: copyRawMarkdown,
                        className: 'fa fa-copy',
                        title: 'Copy raw markdown',
                        // The page is pinned to preview mode; without this
                        // EasyMDE greys the button out, making it unusable.
                        noDisable: true,
                    },
                ],
            });
            // Lock it down: never editable, and pinned to the rendered preview.
            easyMDE.codemirror.setOption('readOnly', 'nocursor');
            if (!easyMDE.isPreviewActive()) easyMDE.togglePreview();
        })();
    </script>
</body>
</html>
