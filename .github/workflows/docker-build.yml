name: Docker Build and Push
on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'DEPLOY')
    strategy:
      fail-fast: false
      matrix:
        include:
          # `web` — the Flask app. Kept as the existing image name
          # `ghcr.io/<org>/<repo>` so existing `docker compose pull` keeps
          # working unchanged.
          - target: web
            dockerfile: Dockerfile
            image_suffix: ""
          # `mcp` — the simpler-mcp sidecar (mcp_server/). Published as
          # `ghcr.io/<org>/<repo>-mcp`. Reachable over the compose network
          # at http://mcp:8765/mcp; never exposed to the host.
          - target: mcp
            dockerfile: mcp_server/Dockerfile
            image_suffix: "-mcp"
          # `sandbox` — the assistant's isolated execution sidecar
          # (sandbox/). Published as `ghcr.io/<org>/<repo>-sandbox`.
          # Reachable over the internal compose network at
          # http://sandbox:8766/mcp; never exposed to the host.
          - target: sandbox
            dockerfile: sandbox/Dockerfile
            image_suffix: "-sandbox"
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (${{ matrix.target }})
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}${{ matrix.image_suffix }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image (${{ matrix.target }})
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ matrix.target }}
        cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  reload:
      runs-on: ubuntu-latest
      needs: build
      steps:
      - name: Reload production server
        run: |
          curl -X POST "${{ secrets.RELOAD_URL }}" \
            -H "X-API-Key: ${{ secrets.RELOAD_API_KEY }}" \
            --fail --silent --show-error
